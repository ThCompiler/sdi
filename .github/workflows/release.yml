name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build source archives
        run: |
          mkdir -p dist
          TAG="${GITHUB_REF_NAME}"
          git archive --format=tar.gz --output="dist/sdi_${TAG}_source.tar.gz" HEAD
          git archive --format=zip --output="dist/sdi_${TAG}_source.zip" HEAD

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
